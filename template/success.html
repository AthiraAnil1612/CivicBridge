<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Submitted</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-2xl p-8 text-center max-w-md w-full">
        <div class="text-green-600 text-5xl mb-4">✅</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">
            Complaint Submitted Successfully!
        </h2>
        <p class="text-gray-600 mb-6">
            Thank you for bringing this to our attention. Our team will review your complaint.
        </p>
        <a href="{% url 'complaint' %}" 
           class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
            Submit Another Complaint
        </a>
    </div>

</body>
</html>
