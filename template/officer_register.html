<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Registration</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A192F; }
        input, select { width: 100%; padding: 1rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 1px solid #d1d5db; background-color: #f9fafb; color: #1f2937; }
        input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25); }
        button { transition: all 0.3s ease-in-out; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .form-label { display: block; font-weight: 500; color: #4b5563; margin-top: 1rem; margin-bottom: 0.25rem; }
        #form-messages p { margin: 0.25rem 0; }
    </style>
</head>
<body class="bg-[#0A192F] flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4">
        <div class="flex flex-col items-center mb-6">
            <svg class="w-12 h-12 text-blue-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h1 class="text-3xl font-bold text-gray-800">CivicBridge</h1>
        </div>

        <h2 class="text-2xl font-semibold text-center text-gray-700 mb-6">Officer Registration</h2>

        <div id="form-messages"></div>

        <form method="post" class="space-y-4" id="registrationForm">
            {% csrf_token %}

            <div>
                <label for="{{ form.username.id_for_label }}" class="form-label">{{ form.username.label }}</label>
                {{ form.username }}
            </div>

            <div>
                <label for="{{ form.officer_id.id_for_label }}" class="form-label">{{ form.officer_id.label }}</label>
                {{ form.officer_id }}
            </div>

            <div>
                <label for="{{ form.department.id_for_label }}" class="form-label">{{ form.department.label }}</label>
                {{ form.department }}
            </div>

            <div>
                <label for="{{ form.email.id_for_label }}" class="form-label">{{ form.email.label }}</label>
                {{ form.email }}
            </div>

            <div>
                <label for="{{ form.registration_code.id_for_label }}" class="form-label">{{ form.registration_code.label }}</label>
                {{ form.registration_code }}
            </div>

            <div>
                <label for="{{ form.password.id_for_label }}" class="form-label">{{ form.password.label }}</label>
                {{ form.password }}
            </div>

            <div>
                <label for="{{ form.confirm_password.id_for_label }}" class="form-label">{{ form.confirm_password.label }}</label>
                {{ form.confirm_password }}
            </div>

            <button type="submit" id="registerBtn"
                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 ease-in-out transform hover:-translate-y-1 mt-6 flex items-center justify-center">
                <span id="registerBtnText">Register</span>
                <span id="registerBtnLoading" class="hidden ml-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor"
                              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
            </button>
        </form>

        <p class="mt-6 text-center text-gray-600 text-sm">
            Already have an officer account?
            <a href="{% url 'officer_login' %}" class="text-blue-600 hover:text-blue-800 font-medium">Login</a>
        </p>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#registrationForm').submit(function(e) {
                e.preventDefault();
                const form = $(this);
                const registerBtn = $('#registerBtn');
                const registerBtnText = $('#registerBtnText');
                const registerBtnLoading = $('#registerBtnLoading');

                registerBtn.prop('disabled', true);
                registerBtnText.text('Creating Account...');
                registerBtnLoading.removeClass('hidden');

                $.ajax({
                    type: "POST",
                    url: "{% url 'create_officer_ajax' %}",
                    data: form.serialize(),
                    success: function(response) {
                        registerBtn.prop('disabled', false);
                        registerBtnText.text('Register');
                        registerBtnLoading.addClass('hidden');

                        if (response.success) {
                            $('#form-messages').html('<p class="text-green-600">' + response.message + '</p>');
                            form[0].reset();
                        } else {
                            let errorHtml = '';
                            for (let field in response.errors) {
                                errorHtml += '<p class="text-red-500 text-sm">' + response.errors[field][0] + '</p>';
                            }
                            $('#form-messages').html(errorHtml);
                        }
                    },
                    error: function() {
                        registerBtn.prop('disabled', false);
                        registerBtnText.text('Register');
                        registerBtnLoading.addClass('hidden');
                        $('#form-messages').html('<p class="text-red-500">An error occurred. Please try again.</p>');
                    }
                });
            });

            // Password confirmation validation
            const password = $('#id_password')[0];
            const confirmPassword = $('#id_confirm_password')[0];
            function validatePasswords() {
                if (confirmPassword.value && password.value !== confirmPassword.value) {
                    confirmPassword.setCustomValidity('Passwords do not match');
                } else {
                    confirmPassword.setCustomValidity('');
                }
            }
            $('#id_password, #id_confirm_password').on('input', validatePasswords);
        });
    </script>
</body>
</html>
