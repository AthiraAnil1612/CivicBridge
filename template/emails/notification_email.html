<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicBridge Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #0A192F;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        .content {
            padding: 20px;
            color: #333333;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666666;
            font-size: 12px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #2563EB;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 0;
        }
        .button:hover {
            background-color: #1D4ED8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CivicBridge</h1>
            <p>Community Complaint Management System</p>
        </div>
        <div class="content">
            {{ message|linebreaks }}
            <p>If you have any questions or need further assistance, please don't hesitate to contact us.</p>
        </div>
        <div class="footer">
            <p>This is an automated message from CivicBridge. Please do not reply to this email.</p>
            <p>&copy; 2024 CivicBridge. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
