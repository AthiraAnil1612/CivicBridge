<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notification</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ecf0f1;
            color: #2c3e50;
            margin: 0;
            padding: 0;
        }
        .email-container {
            max-width: 600px;
            margin: 30px auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .header {
            background-color: #3498db;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .content {
            padding: 20px 0;
            font-size: 1rem;
            line-height: 1.6;
        }
        .footer {
            border-top: 1px solid #ddd;
            padding-top: 15px;
            font-size: 0.9rem;
            color: #7f8c8d;
            text-align: center;
        }
        a.button {
            display: inline-block;
            background-color: #3498db;
            color: white !important;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }
        a.button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            CivicBridge Notification
        </div>
        <div class="content">
            {{ message|linebreaksbr }}
        </div>
        <div class="footer">
            &copy; 2024 CivicBridge. All rights reserved.
        </div>
    </div>
</body>
</html>
